# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -------------------------------------------------------------------------
  # Frontend CI Job (Angular)
  # -------------------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    defaults:
      run:
        working-directory: frontend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Scan Frontend Production Dependencies for Vulnerabilities
      run: npm audit --only=prod --audit-level=high

    - name: Build Angular App
      run: npm run build --if-present

  # -------------------------------------------------------------------------
  # Backend CI Job (Node.js / Express / TypeScript / MongoDB)
  # -------------------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    defaults:
      run:
        working-directory: backend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL (Static Code Analysis)
      uses: github/codeql-action/init@v3
      with:
        languages: 'javascript-typescript'

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Scan Backend Production Dependencies for Vulnerabilities
      run: npm audit --only=prod --audit-level=high

    - name: Compile TypeScript
      run: npm run build --if-present

    - name: Perform CodeQL Security Analysis
      uses: github/codeql-action/analyze@v3

    - name: Run Backend Tests
      run: echo "No tests specified."