<section class="l-section" aria-labelledby="about-title">
  <div class="container">
    <div class="about-content">
 
      <!-- ── Left Column: Text ─────────────────────────────────────────── -->
      <div class="about-text-wrapper">
        <h2 class="section-title" appScrollAnimate animationType="fade-slide">
          About
        </h2>
 
        <ng-container *ngIf="band; else homeAbout">
          <p
            class="about-body"
            appScrollAnimate
            animationType="fade-slide"
            animationDelay="0.1s"
            aria-live="polite"
            title="Band biography"
          >
            {{ band.bio }}
          </p>
        </ng-container>
 
        <ng-template #homeAbout>
          <div *ngIf="loading" class="loading">Loading...</div>
          <div *ngFor="let about of aboutList; let i = index">
            <p
              class="about-body"
              appScrollAnimate
              [animationType]="'fade-slide'"
              [animationDelay]="i * 0.15 + 's'"
              title="About the band"
            >
              {{ about.body }}
            </p>
          </div>
        </ng-template>
      </div>
 
      <!-- ── Right Column: Player (band page) OR Watermark (home page) ── -->
 
      <!-- BAND PAGE: Spotify player replaces watermark -->
      <div
        *ngIf="showStreamingPlayer"
        class="about-visual-accent about-player"
        aria-label="Music player"
      >
        <app-streaming-players
          [streamingPlayer]="streamingPlayer"
        ></app-streaming-players>
      </div>
 
      <!-- HOME PAGE (or band page with no player data): watermark as before -->
      <div
        *ngIf="showWatermark"
        class="about-visual-accent"
        aria-hidden="true"
      >
        <span #parallaxText class="vertical-brand">
          {{ band ? band.name : "MOSAI CANVAS" }}
        </span>
      </div>
 
    </div>
  </div>
</section>
