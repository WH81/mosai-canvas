<!-- Only render the section if at least one player URL is available -->
<section
  *ngIf="hasAnyPlayer"
  class="streaming-players-container"
  aria-label="Music Players"
>
 
  <!-- ── Spotify Player ──────────────────────────────────────────────── -->
  <div *ngIf="hasSpotify" class="player-wrapper spotify">
    <iframe
      [src]="spotifySafeUrl"
      width="100%"
      [height]="playerHeight"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      allowfullscreen
      loading="lazy"
      title="Spotify Artist Player"
      aria-label="Spotify music player"
    ></iframe>
  </div>
 
  <!-- ── Apple Music Player ─────────────────────────────────────────── -->
  <div *ngIf="hasAppleMusic" class="player-wrapper apple-music">
    <iframe
      [src]="appleMusicSafeUrl"
      width="100%"
      [height]="playerHeight"
      frameborder="0"
      allow="autoplay *; encrypted-media *; fullscreen *"
      loading="lazy"
      title="Apple Music Player"
      aria-label="Apple Music player"
      sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation"
    ></iframe>
  </div>
 
</section>
