<div class="streaming-players-container">
  <div *ngIf="spotifySafeUrl" class="player-wrapper spotify">
    <iframe
      [src]="spotifySafeUrl"
      width="100%"
      height="600"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy"
      title="Spotify Player"
      style="border-radius: 12px; max-width: 800px; min-height: 600px;"
    ></iframe>
  </div>

  <div *ngIf="appleMusicSafeUrl" class="player-wrapper apple-music">
    <iframe
      [src]="appleMusicSafeUrl"
      width="100%"
      height="450"
      frameborder="0"
      allow="autoplay *; encrypted-media *;"
      loading="lazy"
      title="Apple Music Player"
      style="width: 100%; max-width: 660px; overflow: hidden; background: transparent;"
      sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation"
    ></iframe>
  </div>
</div>
