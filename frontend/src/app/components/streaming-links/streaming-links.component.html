<div class="streaming-links-container" 
     *ngIf="activeStreaming.length > 0" 
     [ngClass]="[variant, size]" 
     role="list">
  
  <a *ngFor="let link of activeStreaming"
     [href]="link.url"
     target="_blank"
     rel="noopener noreferrer"
     class="streaming-link-item"
     [attr.aria-label]="'Listen on ' + link.label"
     role="listitem">
    <i [class]="link.icon" aria-hidden="true"></i>
  </a>
</div>
