<div class="social-links-container" 
     *ngIf="activeLinks.length > 0" 
     [ngClass]="[variant, size]" 
     role="list">
  
  <a *ngFor="let link of activeLinks"
     [href]="link.url"
     target="_blank"
     rel="noopener noreferrer"
     class="social-link-item"
     [attr.aria-label]="'Follow on ' + link.label"
     role="listitem">
    <i [class]="link.icon" aria-hidden="true"></i>
  </a>
</div>
