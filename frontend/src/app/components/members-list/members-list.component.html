<section class="artist-section l-section">

  <header class="artist-section__header container">
    <h2 class="section-title">Artists</h2>
  </header>

  <div class="members-list-wrapper">
    <div class="container">

      <ng-container *ngFor="let row of memberRows; trackBy: trackByRow">

        <div class="members-list-container">
          <ng-container *ngFor="let member of row; trackBy: trackByName">

            <div
              class="member-column"
              [class.is-active]="selectedMember?.name === member.name"
              [class.is-inactive]="selectedMember !== null && selectedMember.name !== member.name && isInRow(row)"
              appScrollAnimation
              (click)="toggleExpand(member.name)"
              role="button"
              tabindex="0"
            >
              <div class="member-image-bg">
                <img [src]="member.image" class="img-blur-fill" aria-hidden="true" />
                <img [src]="member.image" [alt]="member.name" class="img-main-fit" />
              </div>

              <div class="member-content">
                <div class="text-group">
                  <h2 class="member-name-title">{{ member.name }}</h2>
                  <p class="instrument-subtitle">{{ member.instrument }}</p>
                </div>
              </div>

              <div class="vertical-divider"></div>
            </div>

            <!-- MOBILE ONLY: bio renders below each individual member -->
            <footer
              *ngIf="selectedMember?.name === member.name"
              class="artist-section__footer is-expanded mobile-bio"
              (click)="$event.stopPropagation()"
            >
              <div class="footer-top-bar">
                <button
                  class="close-bio"
                  (click)="handleClose(); $event.stopPropagation()"
                >
                  Close Bio
                </button>
              </div>

              <div class="bio-container">
                <div class="bio-text-column">
                  <h3 class="bio-name">{{ selectedMember.name }}</h3>
                  <h5 class="bio-instrument">{{ selectedMember.instrument }}</h5>
                  <p class="bio-description">{{ selectedMember.bio }}</p>
                </div>

                <div
                  class="bio-social-column"
                  *ngIf="selectedMember?.socialLinks || selectedMember?.streamingLinks"
                >
                  <div class="social-group">
                    <div class="social-title">Follow Me</div>
                    <app-social-links
                      *ngIf="selectedMember?.socialLinks"
                      [socialLinks]="selectedMember?.socialLinks"
                      variant="divided"
                      size="large"
                    ></app-social-links>
                    <app-streaming-links
                      *ngIf="selectedMember?.streamingLinks"
                      [streamingLinks]="selectedMember?.streamingLinks"
                      variant="divided"
                      size="large"
                    ></app-streaming-links>
                  </div>
                </div>
              </div>
            </footer>

          </ng-container>
        </div>

        <!-- DESKTOP ONLY: bio renders below entire row -->
        <footer
          *ngIf="isInRow(row) && selectedMember"
          class="artist-section__footer is-expanded desktop-bio"
        >
          <div class="footer-top-bar">
            <button
              class="close-bio"
              (click)="handleClose(); $event.stopPropagation()"
            >
              Close Bio
            </button>
          </div>

          <div class="bio-container">
            <div class="bio-text-column">
              <h3 class="bio-name">{{ selectedMember.name }}</h3>
              <h5 class="bio-instrument">{{ selectedMember.instrument }}</h5>
              <p class="bio-description">{{ selectedMember.bio }}</p>
            </div>

            <div
              class="bio-social-column"
              *ngIf="selectedMember?.socialLinks || selectedMember?.streamingLinks"
            >
              <div class="social-group">
                <div class="social-title">Follow Me</div>
                <app-social-links
                  *ngIf="selectedMember?.socialLinks"
                  [socialLinks]="selectedMember?.socialLinks"
                  variant="divided"
                  size="large"
                ></app-social-links>
                <app-streaming-links
                  *ngIf="selectedMember?.streamingLinks"
                  [streamingLinks]="selectedMember?.streamingLinks"
                  variant="divided"
                  size="large"
                ></app-streaming-links>
              </div>
            </div>
          </div>
        </footer>

      </ng-container>

    </div>
  </div>

</section>
