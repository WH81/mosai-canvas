<section class="mailing-list l-section" @fadeIn>
  <div class="container mailing-list__wrapper">

    <div class="mailing-list__content">
      <h2 class="section-title">Join the <span class="section-title">Collective</span></h2>
      <p class="mailing-list__desc">
        Sign up for exclusive tour announcements, behind-the-scenes news, and all latest updates.
      </p>
    </div>

    <div class="mailing-list__form-container">
      <form #form="ngForm" (ngSubmit)="addEntry(form)" class="mailing-list__form">

        <div class="form-group">
          <input type="text" [(ngModel)]="newEntry.name" name="name" id="name-input" placeholder=" " required #nameInput="ngModel"/>
          <label for="name-input">Full Name <span class="required">*</span></label>
          <div *ngIf="nameInput.invalid && nameInput.touched" class="error">Required.</div>
        </div>

        <div class="form-group">
          <input type="email" [(ngModel)]="newEntry.email" name="email" id="email-input" placeholder=" " required email #emailInput="ngModel"/>
          <label for="email-input">Email <span class="required">*</span></label>
          <div *ngIf="emailInput.invalid && emailInput.touched" class="error">Valid email required.</div>
        </div>

        <button type="submit" [disabled]="form.invalid || submitting" class="mailing-list__submit">
          <span>{{ submitting ? 'Subscribing...' : 'Subscribe Now' }}</span>
        </button>

        <div *ngIf="submissionError" class="error-message">{{ submissionError }}</div>    
        <div *ngIf="submissionSuccess" class="success-message">Welcome to the Collective.</div>
      </form>
    </div>

    <div class="mailing-list__bg-text">C</div>
  </div>
</section>
