<footer class="footer">
  <div class="footer__container">
    <!-- Center Column -->
    <div class="footer__center">
      <!-- Mosai Canvas logo -->
      <div class="footer__brand">
        <a routerLink="/">
          <app-mosaicanvas-logo variant="footer"></app-mosaicanvas-logo>
        </a>
      </div>

      <div class="footer__links-row">
        <app-social-links *ngIf="socialLinks" [socialLinks]="socialLinks" size="small" class="footer__social-link-icons"></app-social-links>
        <app-streaming-links *ngIf="streamingLinks" [streamingLinks]="streamingLinks" size="small"></app-streaming-links>
      </div>

    </div>
  </div>

  <!-- Copyright -->
  <div class="footer__bottom">
    <p>&copy; {{ currentYear }} Mosai Canvas. All rights reserved.</p>
    <p>Website design & developed by Wayne Hite.</p>
  </div>
</footer>

<!-- Back to Top Button -->
<button id="backToTopBtn" #backToTopBtn class="back-to-top" (click)="scrollToTop()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
        <defs>
            <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#4A90E2" />
                <stop offset="100%" stop-color="#50E3C2" />
            </linearGradient>
        </defs>
        <path
            d="M12 4L4 12H9V20H15V12H20L12 4Z"
            fill="url(#arrowGradient)"
        />
    </svg>
</button>
