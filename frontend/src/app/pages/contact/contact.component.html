<div class="contact-title-wrapper">
  <h2 class="contact-title">Contact Us</h2>
</div>

<div class="contact">
  <form
    [formGroup]="contactForm"
    (ngSubmit)="onSubmit()"
    aria-describedby="formStatus"
    novalidate
  >
    <!-- Full Name -->
    <div class="form-group">
      <input
        id="name"
        type="text"
        formControlName="name"
        placeholder=" "
        required
      />
      <label for="name">Full Name <span class="required">*</span></label>
      <div class="error" *ngIf="submitted && f['name'].invalid">
        Name must be 2–50 characters.
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder=" "
        required
      />
      <label for="email">Email <span class="required">*</span></label>
      <div class="error" *ngIf="submitted && f['email'].invalid">
        Please enter a valid email address.
      </div>
    </div>

    <!-- Subject -->
    <div class="form-group">
      <input
        id="subject"
        type="text"
        formControlName="subject"
        placeholder=" "
      />
      <label for="subject">Subject</label>
    </div>

    <!-- Message -->
    <div class="form-group">
      <textarea
        id="message"
        formControlName="message"
        rows="5"
        placeholder=" "
        required
      ></textarea>
      <label for="message">Message <span class="required">*</span></label>
      <div class="error" *ngIf="submitted && f['message'].invalid">
        Message must be 10–1000 characters.
      </div>
    </div>

    <!-- Submit Button -->
    <button type="submit" [disabled]="sending">
      {{ sending ? 'Sending…' : 'Send Message' }}
    </button>
  </form>

  <!-- Live Region -->
  <p id="formStatus" class="visually-hidden" aria-live="polite">
    {{ successMessage }} {{ errorMessage }}
  </p>

  <div *ngIf="successMessage" class="success-message">
    {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="error">
    {{ errorMessage }}
  </div>
</div>
