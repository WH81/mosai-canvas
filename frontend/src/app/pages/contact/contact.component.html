<div class="contact-title-wrapper">
  <h2 class="contact-title">Contact the Band</h2>
</div>

<div class="contact">
  <form
    [formGroup]="contactForm"
    (ngSubmit)="onSubmit()"
    aria-describedby="formStatus"
    novalidate
  >
    <!-- Name -->
    <input
      id="name"
      formControlName="name"
      type="text"
      autocomplete="name"
      placeholder="Full Name"
      aria-label="Full Name"
      [attr.aria-invalid]="submitted && f['name'].invalid"
      required
    />
    <div class="error" *ngIf="submitted && f['name'].invalid">
      Name must be 2–50 characters.
    </div>

    <!-- Email -->
    <input
      id="email"
      formControlName="email"
      type="email"
      autocomplete="email"
      placeholder="Email"
      aria-label="Email"
      [attr.aria-invalid]="submitted && f['email'].invalid"
      required
    />
    <div class="error" *ngIf="submitted && f['email'].invalid">
      Please enter a valid email.
    </div>

    <!-- Subject -->
    <input
      id="subject"
      formControlName="subject"
      type="text"
      maxlength="100"
      placeholder="Subject"
      aria-label="Subject"
    />

    <!-- Message -->
    <textarea
      id="message"
      formControlName="message"
      rows="5"
      placeholder="Message"
      aria-label="Message"
      [attr.aria-invalid]="submitted && f['message'].invalid"
      required
    ></textarea>
    <div class="error" *ngIf="submitted && f['message'].invalid">
      Message must be 10–1000 characters.
    </div>

    <!-- Submit -->
    <button type="submit" [disabled]="sending">
      {{ sending ? 'Sending…' : 'Send Message' }}
    </button>
  </form>

  <!-- Live region -->
  <p id="formStatus" class="visually-hidden" aria-live="polite">
    {{ successMessage }} {{ errorMessage }}
  </p>

  <div *ngIf="successMessage" class="success-message">
    {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="error">
    {{ errorMessage }}
  </div>
</div>
